apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend

spec:
  replicas: {{ .Values.backend.replicas }}

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
      - name: backend

        image: {{ .Values.backend.image }}

        ports:
        - containerPort: {{ .Values.backend.containerPort }}

        env:
          - name: DB_HOST
            valueFrom:
              configMapKeyRef:
                name: backend-config
                key: DB_HOST

          - name: DB_NAME
            valueFrom:
              configMapKeyRef:
                name: backend-config
                key: DB_NAME

          - name: PORT
            valueFrom:
              configMapKeyRef:
                name: backend-config
                key: PORT

          - name: DB_USER
            valueFrom:
              secretKeyRef:
                name: backend-secret
                key: DB_USER

          - name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: backend-secret
                key: DB_PASSWORD